description: >-
  Behind every new scientific discovery, every new device, every new drug and
  new policy guideline, there are literature reviews. DistillerSR's software
  enables customers to securely automate the management of evidence-based
  research and the analysis of its data faster, more accurately, and more
  transparently at scale. Leading healthcare research organizations rely on
  DistillerSR for their literature and systematic reviews.
apis:
  - aid: distillersr-api:distillersr-api
    name: DistillerSR API
    tags:
      - Healthcare
      - Literature Reviews
      - Systematic Reviews
    humanURL: https://www.distillersr.com/
    baseURL: https://v1serv-prod.evidencepartners.com/api/v1
    properties:
      - type: Documentation
        url: https://apidocs.evidencepartners.com/
      - type: Documentation
        url: https://v1serv-prod.evidencepartners.com/api/v1/docs
    description: >-
      The DistillerSR API allows technical users to interact with DistillerSR
      features programmatically for use in automated scripts and integrations
      outside of DistillerSR. It supports performing systematic reviews by
      importing references from sources such as PubMed and EBSCO, reviewing
      references, and generating reports containing reviewer response sets,
      extracted data, and other statistics.
