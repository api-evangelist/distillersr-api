description: >-
  Behind every new scientific discovery, every new device, every new drug and
  new policy guideline, there are literature reviews. Our software enables
  customers to securely automate the management of evidence-based research and
  the analysis of its data faster, more accurately, and more transparently at
  scale. That is why the world's leading healthcare research organizations trust
  us for their literature reviews.
